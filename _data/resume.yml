projects:
  - title: "分布式系统一致性算法 Raft 实现（MIT 6.824 实验）"
    description: "在提供的 Go 语言代码框架上复刻论文细节，实现完整、容错的分布式系统，并通过不可靠网络环境、服务器崩溃、客户端重启和 RPC 次数限制等测试样例。"
    bullets:
      - "实现 MapReduce 计算框架，由中心 Coordinator 节点和多个 Worker 节点组成，先后通过 Map 和 Reduce 阶段完成键值统计。"
      - "实现 Raft 协议，完成领导选举、日志复制分发、持久化存储和状态机快照等功能。"
      - "实现 Fault-tolerant Key/Value Service，服务器集群底层使用 Raft 保证线性强一致性，维护简易数据库，支持键值对读写与追加操作。"
  - title: "2024 开源操作系统训练营 rCore"
    description: "根据清华大学 rCore OS 教程，学习用 Rust 编写基于 RISC-V 架构的内核，覆盖虚拟内存、多进程多线程、文件系统等功能。"
    bullets:
      - "学习 Rust 程序设计语言与 rCore 内核代码框架，完成五个 rCore 实验。"
      - "在提供的 Rust OS 内核上增加任务信息查询、mmap、munmap、spawn、硬链接等系统调用，并实现死锁检测算法。"
  - title: "xjtu-ics 实验"
    description: "完成 CSAPP 中 ICS 部分实验，并实现动态库加载器的基本功能。"
    bullets:
      - "支持将库载入内存、重定位全局符号和函数、执行库初始化函数。"
      - "支持递归加载库依赖项以及延迟绑定功能。"
