projects:
  - title: "Raft-based Distributed Systems Implementation (MIT 6.824 Labs)"
    description: "Implemented fault-tolerant distributed systems in Go by following the details of the original papers and passed tests covering unreliable networks, server crashes, client restarts, and RPC-count constraints."
    bullets:
      - "Built a MapReduce framework with a central Coordinator and multiple Worker nodes, completing key-value aggregation through Map and Reduce phases."
      - "Implemented the Raft consensus protocol, including leader election, log replication, persistence, and state-machine snapshots."
      - "Implemented a fault-tolerant key/value service backed by Raft for linearizable consistency, supporting read, write, and append operations over a simple database."
  - title: "rCore 2024 Open Source Operating System Training Camp"
    description: "Studied the Tsinghua rCore OS tutorial and built a Rust-based kernel for the RISC-V architecture, covering virtual memory, multiprocessing, multithreading, and file systems."
    bullets:
      - "Learned the Rust programming language and the rCore kernel framework, completing five rCore labs."
      - "Added system calls for task information, mmap, munmap, spawn, hard links, and implemented deadlock detection in the provided Rust OS kernel."
  - title: "xjtu-ics Labs"
    description: "Completed the ICS labs based on CS:APP and implemented core functionality of a dynamic library loader."
    bullets:
      - "Implemented library loading into memory, relocation of global symbols and functions, and execution of library initialization functions."
      - "Supported recursive loading of library dependencies and lazy binding."
